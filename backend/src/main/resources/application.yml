server:
  port: 8080
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        boot:
          allow_jdbc_metadata_access: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

tour-api:
  base-url: https://apis.data.go.kr/B551011/KorService2
  datalab-url: https://apis.data.go.kr/B551011/DataLabService
  service-key: ${TOUR_API_SERVICE_KEY}

congestion:
  sync:
    zone: Asia/Seoul
    cron: 0 50 23 * * *

kakao:
  client-id: ${KAKAO_REST_API_KEY}
  local-api-url: https://dapi.kakao.com
  direction-api-url: https://apis-navi.kakaomobility.com

jwt:
  secret: ${JWT_SECRET}
  access-expiry-ms: 900000
  refresh-expiry-ms: 1209600000

encryption:
  key: ${ENCRYPTION_KEY}

app:
  deep-link-scheme: ${APP_DEEP_LINK_SCHEME:tripmate://auth/callback}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
